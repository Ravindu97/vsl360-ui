services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vsl360
      POSTGRES_PASSWORD: vsl360
      POSTGRES_DB: vsl360
    ports:
      - "5432:5432"
    volumes:
      - vsl360_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsl360 -d vsl360"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://vsl360:vsl360@db:5432/vsl360?schema=public"
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  vsl360_pgdata:
